<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Agro Hub</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h1 style="color: #2e7d32;">Smart Agro Hub</h1>
        <p style="font-size: 18px; color: #555;">Welcome to the future of Farming! 🌾</p>

        <hr style="width: 50%; margin: 30px auto; border: 1px solid #ddd;">

        <form method="GET" action="" style="margin-bottom: 30px;">
    <input type="text" name="search_box" placeholder="Search crops here..." style="padding: 10px; width: 300px; border: 1px solid #2e7d32; border-radius: 4px;">
    <button type="submit" style="padding: 10px 20px; background-color: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer;">Search</button>
</form>

        <h2>Available Crops</h2>

        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 20px;">
            {% for crop in crops_list %}
                <div style="border: 1px solid #2e7d32; padding: 20px; border-radius: 8px; width: 250px; background-color: #f1f8e9; text-align: left;">
                    <h3 style="color: #1b5e20; margin-top: 0;">{{ crop.name }}</h3>
                    <p><strong>Category:</strong> {{ crop.category }}</p>
                    <p><strong>Price:</strong> ₹{{ crop.price_per_kg }} / kg</p>
                    <p style="color: #666; font-size: 14px;">{{ crop.description }}</p>
                </div>
            {% empty %}
                <p>No crops available at the moment.</p>
            {% endfor %}
        </div>
    </div>
</body>
